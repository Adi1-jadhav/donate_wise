<!DOCTYPE html>
<html lang="en">

<head>
    <title>Report Surplus Event Food | DonateWise Pro</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #f59e0b;
            --accent: #ef4444;
            --dark: #0f172a;
            --slate: #1e293b;
            --light: #f8fafc;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark);
            color: var(--light);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(245, 158, 11, 0.03) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(239, 68, 68, 0.03) 0%, transparent 20%);
            min-height: 100vh;
        }

        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        /* 🌐 GLASS NAVBAR */
        .navbar-pro {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 0;
            position: sticky; top: 0; z-index: 1000;
        }

        .form-hero { padding: 60px 0 40px; text-align: center; }

        .badge-pro {
            background: rgba(15, 23, 42, 0.5); border: 1px solid var(--glass-border);
            color: var(--primary); font-weight: 800; text-transform: uppercase;
            letter-spacing: 2px; font-size: 0.7rem; padding: 8px 16px; border-radius: 100px;
        }

        /* 🎫 PREMIUM GLASS FORM */
        .glass-card {
            background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border); border-radius: 40px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.5);
            overflow: hidden; animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header-pro {
            background: linear-gradient(135deg, #f59e0b, #ea580c);
            padding: 40px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-label-pro {
            font-weight: 800; font-size: 0.75rem; text-transform: uppercase;
            letter-spacing: 1.5px; color: #94a3b8; margin-bottom: 0.75rem; display: block;
        }

        .input-group-pro {
            background: rgba(255, 255, 255, 0.03); border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 18px; overflow: hidden; display: flex; align-items: center; padding: 0 20px;
        }
        .input-group-pro:focus-within {
            border-color: var(--primary); background: rgba(255, 255, 255, 0.06);
        }

        .input-pro {
            flex: 1; background: transparent; border: none;
            color: white; padding: 16px 15px; font-weight: 500; outline: none !important;
        }

        .select-pro {
            width: 100%; background: rgba(255, 255, 255, 0.03); border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 18px; color: white; padding: 16px 20px; font-weight: 600;
            appearance: none; cursor: pointer; border: none; outline: none;
        }
        /* Style wrapper for Select to add Bi-icon */
        .select-wrap { position: relative; }
        .select-wrap::after {
            content: '\F229'; font-family: "bootstrap-icons"; position: absolute;
            right: 20px; top: 50%; transform: translateY(-50%); pointer-events: none; opacity: 0.5;
        }

        /* 📜 PLEDGE DESIGN */
        .pledge-section {
            background: rgba(239, 68, 68, 0.05); border: 1px dashed rgba(239, 68, 68, 0.3);
            border-radius: 25px; padding: 30px; margin-top: 2rem;
        }

        .btn-dispatch {
            background: linear-gradient(135deg, #f59e0b, #ea580c);
            color: white; border: none; border-radius: 100px;
            padding: 20px; font-weight: 900; font-size: 1.2rem; width: 100%;
            margin-top: 1rem; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .btn-dispatch:hover {
            transform: translateY(-5px); box-shadow: 0 30px 60px -15px rgba(245, 158, 11, 0.6);
        }

    </style>
</head>

<body>

    <nav class="navbar-pro">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="{{ url_for('main.home') }}" class="text-white text-decoration-none fw-900 h4 m-0">
                <i class="bi bi-box2-heart-fill text-amber me-2"></i>DonateWise
            </a>
            <div class="d-none d-md-flex gap-2">
                <a href="{{ url_for('food_rescue.landing') }}" class="btn btn-outline-light btn-sm rounded-pill px-4 fw-bold">Back to Rescue Channel</a>
            </div>
        </div>
    </nav>

    <section class="form-hero">
        <div class="container">
            <div class="badge-pro mb-3"><i class="bi bi-shield-lock-fill me-2"></i> Verified Dispatch Channel</div>
            <h1 class="hero-title" style="font-size: 3rem; font-weight: 900; letter-spacing: -2px;">Launch <span class="text-amber">Mega Rescue</span></h1>
            <p class="text-secondary mx-auto" style="max-width: 600px;">
                Complete this manifest to initiate a live broadcast to nearby NGO rescue teams. 
            </p>
        </div>
    </section>

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="glass-card">
                    <div class="card-header-pro">
                        <h2 class="fw-900 text-white m-0 h4">Rescue Manifest</h2>
                    </div>

                    <div class="p-4 p-md-5">
                        <form action="{{ url_for('food_rescue.submit_rescue') }}" method="POST">
                            <div class="row g-4 mt-2">
                                <div class="col-md-6">
                                    <label class="form-label-pro">Event Category</label>
                                    <div class="select-wrap">
                                        <select class="select-pro" name="event_type" required>
                                            <option value="" disabled selected>Select event...</option>
                                            <option value="Wedding">💍 Wedding</option>
                                            <option value="Birthday Party">🎂 Birthday Party</option>
                                            <option value="Corporate Event">🏢 Corporate Event</option>
                                            <option value="Bhandara / Pooja">🙏 Bhandara / Community Feast</option>
                                            <option value="Other">👥 Other Bulk Gathering</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label-pro">Food State</label>
                                    <div class="select-wrap">
                                        <select class="select-pro" name="food_type" required>
                                            <option value="Cooked (Prepared today)">🍲 Cooked (Today)</option>
                                            <option value="Raw Materials / Groceries">🥕 Raw / Bulk Groceries</option>
                                            <option value="Packaged Items">📦 Packaged / Sealed</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label-pro">Quantity Estimate</label>
                                    <div class="input-group-pro">
                                        <i class="bi bi-people-fill text-muted me-2"></i>
                                        <input type="number" name="quantity_persons" class="input-pro" placeholder="e.g. 100 persons" min="10" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label-pro">Urgency Window</label>
                                    <div class="select-wrap">
                                        <select class="select-pro text-danger" name="best_before_hours" required>
                                            <option value="" disabled selected>Perishes in...</option>
                                            <option value="2">⏳ 2 Hours (Critical)</option>
                                            <option value="4">⌛ 4 Hours</option>
                                            <option value="8">🌗 8 Hours</option>
                                            <option value="24">📅 24 Hours</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="col-12">
                                    <label class="form-label-pro">Geographic Pickup Address</label>
                                    <div class="input-group-pro">
                                        <i class="bi bi-geo-alt-fill text-danger me-2"></i>
                                        <input type="text" name="address" class="input-pro" placeholder="Venue name, Floor, Nearest Landmark..." required>
                                    </div>
                                </div>

                                <div class="col-12">
                                    <label class="form-label-pro">Dispatch Contact</label>
                                    <div class="input-group-pro">
                                        <span class="text-muted fw-bold me-2">+91</span>
                                        <input type="tel" name="contact_number" class="input-pro" placeholder="10-digit mobile number" pattern="[0-9]{10}" required>
                                    </div>
                                </div>

                                <div class="col-12">
                                    <div class="pledge-section">
                                        <div class="d-flex align-items-center gap-3 mb-3">
                                            <i class="bi bi-shield-fill-check text-success fs-3"></i>
                                            <h5 class="fw-900 m-0 text-white">Quality Guarantee</h5>
                                        </div>
                                        <div class="form-check form-switch fs-5">
                                            <input class="form-check-input" type="checkbox" role="switch" id="pledgeSwitch" name="pledge_accepted" required>
                                            <label class="form-check-label fs-6 ms-2 text-secondary" for="pledgeSwitch">
                                                I certify that this food is fresh and safe for consumption. I understand that donating spoiled food is strictly prohibited.
                                            </label>
                                        </div>
                                    </div>
                                </div>

                                <div class="col-12 text-center mt-5">
                                    <button type="submit" class="btn-dispatch">
                                        <i class="bi bi-lightning-charge-fill"></i> Execute Live Broadcast
                                    </button>
                                    <a href="{{ url_for('food_rescue.landing') }}" class="btn btn-link text-secondary mt-3 text-decoration-none">Abort Request</a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
