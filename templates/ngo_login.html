<!DOCTYPE html>
<html lang="en">

<head>
    <title>NGO Partner Login | DonateWise</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #059669;
            --primary-dark: #047857;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .app-logo {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .app-logo i {
            margin-right: 0.5rem;
        }

        .auth-title {
            text-align: center;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 2rem;
        }

        .form-label {
            font-weight: 600;
            color: #475569;
            font-size: 0.9rem;
        }

        .input-group-text {
            background: transparent;
            border-right: none;
            color: #94a3b8;
        }

        .form-control {
            border-left: none;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            color: #1e293b;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #dee2e6;
        }

        .btn-success {
            background: var(--primary);
            border: none;
            padding: 0.8rem;
            font-weight: 700;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .btn-success:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(5, 150, 105, 0.3);
        }

        .role-switch-container {
            background: #f1f5f9;
            padding: 0.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: flex;
            gap: 0.25rem;
        }

        .role-btn {
            flex: 1;
            padding: 0.5rem;
            border: none;
            background: transparent;
            font-size: 0.85rem;
            font-weight: 600;
            color: #64748b;
            border-radius: 8px;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
        }

        .role-btn.active {
            background: #fff;
            color: var(--primary);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #64748b;
        }

        .register-link a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
        }

        .alert {
            border-radius: 12px;
            font-weight: 500;
            font-size: 0.9rem;
            border: none;
        }

        .verification-hint {
            text-align: center;
            margin-top: 1rem;
            color: #94a3b8;
            font-size: 0.8rem;
        }
    </style>

    <!-- Vercel Web Analytics -->
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>

<body>

    <div class="auth-card">
        <div class="app-logo"><i class="bi bi-box2-heart-fill"></i>DonateWise</div>
        <p class="auth-title">NGO Partner Login</p>

        <div class="role-switch-container">
            <a href="{{ url_for('auth.login') }}" class="role-btn">Donor</a>
            <a href="{{ url_for('auth.ngo_login') }}" class="role-btn active">NGO</a>
            <a href="{{ url_for('auth.admin_login') }}" class="role-btn">Admin</a>
        </div>

        <!-- ⚠️ Flash Messages -->
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="alert alert-danger mb-4">
            <i class="bi bi-exclamation-circle me-2"></i>{{ messages[0] }}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.ngo_login') }}">
            <div class="mb-3">
                <label for="email" class="form-label">Organization Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-building"></i></span>
                    <input type="email" name="email" id="email" class="form-control" placeholder="contact@ngo.org"
                        required>
                </div>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" id="password" class="form-control" placeholder="••••••••"
                        required>
                </div>
            </div>
            <button type="submit" class="btn btn-success w-100">NGO Log In</button>
        </form>

        <div class="verification-hint">
            <i class="bi bi-info-circle me-1"></i> Dashboard access requires admin approval.
        </div>

        <div class="register-link">
            Not registered yet? <a href="{{ url_for('main.register_ngo_route') }}">Register NGO</a>
        </div>
    </div>

</body>

</html>
