<!DOCTYPE html>
<html lang="en">

<head>
    <title>NGO Registration | DonateWise</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #059669;
            --primary-dark: #047857;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 2rem 0;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 650px;
            padding: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .app-logo {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--primary);
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .app-logo i {
            margin-right: 0.5rem;
        }

        .auth-title {
            text-align: center;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 2rem;
            font-size: 1.25rem;
        }

        .form-label {
            font-weight: 600;
            color: #475569;
            font-size: 0.9rem;
        }

        .input-group-text {
            background: #f8fafc;
            color: #94a3b8;
            border-radius: 10px 0 0 10px;
        }

        .form-control,
        .form-select {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            color: #1e293b;
        }

        .form-control:focus,
        .form-select:focus {
            box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.1);
            border-color: var(--primary);
        }

        .btn-success {
            background: var(--primary);
            border: none;
            padding: 1rem;
            font-weight: 700;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }

        .btn-success:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(5, 150, 105, 0.3);
        }

        .login-link {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.95rem;
            color: #64748b;
        }

        .login-link a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
        }

        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            margin: 1.5rem 0 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }
    </style>

    <!-- Vercel Web Analytics -->
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>

<body>

    <div class="auth-card">
        <div class="app-logo"><i class="bi bi-box2-heart-fill"></i>DonateWise</div>
        <p class="auth-title">Register Your Organization</p>

        <!-- ⚠️ Flash Messages -->
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="alert alert-danger mb-4 border-0 shadow-sm rounded-3">
            <i class="bi bi-exclamation-circle me-2"></i>{{ messages[0] }}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('main.register_ngo_route') }}" enctype="multipart/form-data">
            <div class="section-title">Basic Information</div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="org_name" class="form-label">Organization Name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-building"></i></span>
                        <input type="text" class="form-control" name="org_name" placeholder="Name" required>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="contact_email" class="form-label">Contact Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" name="contact_email" placeholder="email@ngo.org"
                            required>
                    </div>
                </div>
            </div>

            <div class="section-title">Security</div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="password" class="form-label">Create Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                        <input type="password" class="form-control" name="password" placeholder="••••••••" required>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="confirm_password" class="form-label">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-shield-check"></i></span>
                        <input type="password" class="form-control" name="confirm_password" placeholder="••••••••"
                            required>
                    </div>
                </div>
            </div>

            <div class="section-title">Location & Mission</div>
            <div class="mb-3">
                <label for="location" class="form-label">Location (Address/City)</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                    <input type="text" class="form-control" name="location" placeholder="e.g. Shivaji Nagar, Pune"
                        required>
                </div>
            </div>
            <div class="mb-4">
                <label for="mission" class="form-label">Organization Mission</label>
                <textarea class="form-control" name="mission" rows="3"
                    placeholder="Tell us what your NGO is passionate about..." required></textarea>
            </div>

            <button type="submit" class="btn btn-success w-100 shadow-sm mt-3">Submit Registration</button>
        </form>

        <div class="login-link">
            Already registered? <a href="{{ url_for('auth.ngo_login') }}">Log In here</a>
        </div>
    </div>

</body>

</html>
